name: Publish Container

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish, without the leading v"
        required: true
        default: "0.5.1"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/johed-velca/to-digi-rs

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        run: cargo test --locked

      - name: Validate deployment scripts
        run: bash scripts/test-deploy.sh

      - name: Validate Compose template
        run: |
          cd deploy
          LOCAL_UID="$(id -u)" LOCAL_GID="$(id -g)" docker compose config

  package-deployment:
    name: Package Deployment Bundle
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build deployment archive
        run: bash scripts/package-deploy.sh

      - name: Upload deployment archive
        uses: actions/upload-artifact@v4
        with:
          name: to-digi-rs-deploy-v0.5.1
          path: target/release-bundles/to-digi-rs-deploy-v0.5.1.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GHCR Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.value }}
            ${{ env.IMAGE_NAME }}:v${{ steps.version.outputs.value }}
          labels: |
            org.opencontainers.image.title=to-digi-rs
            org.opencontainers.image.description=One-shot DIGIweb PLU importer
            org.opencontainers.image.version=${{ steps.version.outputs.value }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
