services:
  importer:
    image: ${TO_DIGI_RS_IMAGE:-ghcr.io/johed-velca/to-digi-rs:0.5.0}
    network_mode: host
    working_dir: /work
    user: "${LOCAL_UID:?LOCAL_UID is required}:${LOCAL_GID:?LOCAL_GID is required}"
    environment:
      DIGIWEB_CLIENT_SECRET: ${DIGIWEB_CLIENT_SECRET:-}
    volumes:
      - type: bind
        source: .
        target: /work
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: "no"
