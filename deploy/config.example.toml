[digiweb]
base_url = "https://DIGIWEB_HOST_OR_IP"
client_id = "digi"
client_secret = ""
log_credentials_for_testing = false
token_url = "https://DIGIWEB_HOST_OR_IP/auth/realms/skypro/protocol/openid-connect/token"
store_number = 1
allow_invalid_certificates = false
plu_upsert_path = "/api/v1/third-party/plus/write"
request_status_path_template = "/api/thirdpartylinker/api/v1/requests/{request_id}"
plu_barcode_type = ""
plu_barcode_ref_no = ""

[timeouts]
request_seconds = 30
poll_interval_seconds = 2
poll_timeout_seconds = 120

[verification]
# Used by future operational post-import readback checks after a supported
# read-only PLU API is confirmed. v0.6.0 verify-import currently stops at the
# API discovery gate and reports the missing DIGIweb contract details.
poll_interval_seconds = 2
timeout_seconds = 60

[import]
# Deprecated as command selectors in v0.5.1. Use:
#   ./import.sh analyze
#   ./import.sh import --test
#   ./import.sh import --limit N
#   ./import.sh import --continue-on-error
# These values are still honored for one release when import.sh is executed without a command.
continue_after_record_failure = false
send_only_first_plu = true
dry_run_inspect_only = true
write_payload_preview = true

[mapping]
main_plu_table = "Pludata"
ingredient_table = "PluIng"
nutrition_table = ""
